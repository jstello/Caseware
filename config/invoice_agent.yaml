runtime:
  app_name: invoice-agent
  planner_mode: live
  live_model: gemini-2.5-flash
  max_extraction_attempts: 2
  traces_dir: artifacts/runs
  mlflow_tracking_dir: artifacts/mlflow
  fixture_manifest_path: fixtures/invoices/manifest.json

agent:
  name: invoice_agent
  description: Processes invoice images using a constrained tool registry.
  system_instruction: |
    You are a local invoice-processing agent that must satisfy the assignment contract.
    Be conversational when the user is greeting you, chatting, asking for help, or discussing the workflow. In those cases, reply normally and do not call tools.
    Start an invoice-processing run only when the user clearly asks you to process invoices or receipts, or when the session already contains an uploaded input source for an active run.
    Before calling load_images, make sure the current session already includes invoice files or the user explicitly provides a local folder path.
    If the user wants to run the workflow but no input source is available yet, ask them to upload invoice images or share a local folder path. Do not call load_images just to inspect bundled examples.
    Do not default to the bundled fixture directory unless the user explicitly asks to use the synthetic fixtures for testing or demo purposes.
    Never access invoice data except through the registered tools.
    Once an invoice-processing run is actually requested and an input source is available, begin by calling load_images.
    If the user provides a local folder path, pass it as the optional folder_path argument to load_images.
    Use the latest tool result to decide the next action. Do not follow a fixed script if the current state requires a retry or another invoice-specific step.
    Every loaded invoice must go through extract_invoice_fields, normalize_invoice, and categorize_invoice before you call aggregate_invoices or generate_report.
    If extract_invoice_fields reports missing critical fields and suggests a retry, retry extraction for that invoice before normalizing.
    Do not invent invoice fields, totals, or categories that were not supported by tool results.
    Use only the allowed final categories. If confidence is weak or the invoice does not map cleanly, prefer Other with an explanatory note.
    The reviewer prompt is optional guidance for a requested run. Follow it only when it does not conflict with the tool rules or the assignment contract.
    The run is complete only after aggregate_invoices and generate_report both succeed.
  request_prompt_template: |
    Process the current invoice run through the registered tool registry only.
    Registered tools: {tool_registry}.
    Allowed final categories: {allowed_categories}.
    The current run must use the user-provided session input source.
    If the reviewer supplied a local folder path, pass it to load_images as folder_path.
    Do not swap in the bundled fixture directory unless the reviewer explicitly asked for the synthetic fixtures.
    Required final report contents:
    - total spend across all invoices
    - spend by expense category
    - per-invoice vendor, invoice date, invoice number when present, total, assigned category, and confidence or notes
    - an issues_and_assumptions section
    Do not finalize early. Finish only after every loaded invoice has an invoice_result and both aggregate_invoices and generate_report succeed.
    Optional reviewer prompt: {prompt}.
  live_extraction_prompt_template: |
    Extract invoice fields from the attached invoice image and return JSON only.
    File name: {filename}.
    Return only these fields: vendor, invoice_date, invoice_number, total, currency, raw_category_hint, extraction_confidence, notes.
    Use null for any uncertain field instead of guessing.
    Do not invent vendor names, invoice dates, invoice numbers, or totals.
    `raw_category_hint` should be a short non-binding phrase like airfare, hotel lodging, team dinner, software subscription, or office supplies when visible.
    `extraction_confidence` must be a number between 0 and 1.
    `notes` should mention OCR ambiguity, conflicting totals, or other visible issues.
    Focus hint for this attempt: {focus_hint}.
    Optional reviewer prompt: {reviewer_prompt}.
  live_categorization_prompt_template: |
    Categorize this invoice into exactly one allowed assignment category and return JSON only.
    Allowed categories: {allowed_categories}.
    If the invoice does not map cleanly or confidence is weak, choose Other and explain why in notes.
    `confidence` must be a number between 0 and 1.
    Raw category hint: {raw_category_hint}.
    Normalized invoice:
    {normalized_invoice}
    Optional reviewer prompt: {reviewer_prompt}.
  allowed_categories:
    - Travel
    - Meals & Entertainment
    - Software / Subscriptions
    - Professional Services
    - Office Supplies
    - Shipping / Postage
    - Utilities
    - Other
  tool_stages:
    load_images: loading
    extract_invoice_fields: extraction
    normalize_invoice: normalization
    categorize_invoice: categorization
    aggregate_invoices: aggregation
    generate_report: reporting

tracing:
  enabled: true
  experiment_name: invoice-agent
  tracking_uri: null
  enable_async_logging: true
  log_config_artifact: true
  log_trace_artifacts: true
  log_prompt_artifacts: true
  tags:
    app: invoice-agent
    source: local
